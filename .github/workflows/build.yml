name: Build APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download whisper.cpp source
        run: |
          cd app/src/main/cpp
          git clone --depth 1 https://github.com/ggerganov/whisper.cpp.git whisper-tmp
          rm -rf whisper
          mkdir -p whisper
          cp whisper-tmp/*.c whisper-tmp/*.h whisper/
          ls -la whisper/
          rm -rf whisper-tmp

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lao-translator-debug
          path: app/build/outputs/apk/debug/app-debug.apk
