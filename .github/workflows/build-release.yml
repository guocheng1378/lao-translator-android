name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Parse version from tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          NAME=${TAG#v}
          MAJOR=$(echo $NAME | cut -d. -f1)
          MINOR=$(echo $NAME | cut -d. -f2)
          CODE=$((MAJOR * 100 + MINOR))
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "code=$CODE" >> $GITHUB_OUTPUT
          echo "Version: $NAME (code: $CODE)"

      - name: Update version files
        run: |
          TAG=${{ steps.version.outputs.tag }}
          NAME=${{ steps.version.outputs.name }}
          CODE=${{ steps.version.outputs.code }}

          # 更新 build.gradle.kts
          sed -i "s/versionCode = .*/versionCode = $CODE/" app/build.gradle.kts
          sed -i "s/versionName = .*/versionName = \"$NAME\"/" app/build.gradle.kts

          # 更新 version.json（changelog 后续步骤填充）
          cat > version.json << EOF
          {
            "versionCode": $CODE,
            "versionName": "$TAG",
            "apkUrl": "https://github.com/${{ github.repository }}/releases/download/$TAG/app-release-unsigned.apk",
            "changelog": "",
            "fileSize": 0
          }
          EOF

          echo "Updated version to $TAG (code: $CODE)"

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/
          echo "/opt/gradle-8.5/bin" >> $GITHUB_PATH

      - name: Generate Wrapper
        run: gradle wrapper --gradle-version 8.5

      - name: Build APK
        run: ./gradlew assembleRelease

      - name: Update version.json with file size and changelog
        run: |
          SIZE=$(stat -c%s app/build/outputs/apk/release/*.apk 2>/dev/null || echo 0)
          TAG=${{ steps.version.outputs.tag }}
          NAME=${{ steps.version.outputs.name }}
          CODE=${{ steps.version.outputs.code }}

          # 从 CHANGELOG.md 提取当前版本的更新说明
          CHANGELOG=""
          if [ -f CHANGELOG.md ]; then
            # 提取 "## TAG" 到下一个 "## " 之间的内容
            CHANGELOG=$(awk "/^## $TAG/{found=1; next} /^## /{if(found) exit} found{print}" CHANGELOG.md | sed '/^$/d' | sed 's/^- //;s/$/\\n/' | tr -d '\n' | sed 's/\\n$//')
          fi
          # 如果为空，使用默认说明
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="版本 $NAME 更新"
          fi

          cat > version.json << EOF
          {
            "versionCode": $CODE,
            "versionName": "$TAG",
            "apkUrl": "https://github.com/${{ github.repository }}/releases/download/$TAG/app-release-unsigned.apk",
            "changelog": "$CHANGELOG",
            "fileSize": $SIZE
          }
          EOF

          echo "Changelog: $CHANGELOG"

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk

      - name: Commit version files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git add version.json app/build.gradle.kts
          git diff --staged --quiet || git commit -m "chore: bump version to ${{ steps.version.outputs.tag }}"
          git checkout . || true
          git pull --rebase origin main
          git push origin main
