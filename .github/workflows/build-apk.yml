name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses

      - name: Setup whisper.cpp source
        run: |
          git clone --depth 1 --branch v1.7.6 https://github.com/ggml-org/whisper.cpp.git /tmp/whisper-src
          rm -rf app/src/main/cpp/whisper
          mkdir -p app/src/main/cpp/whisper
          cp -r /tmp/whisper-src/ggml app/src/main/cpp/whisper/
          cp -r /tmp/whisper-src/src app/src/main/cpp/whisper/
          cp -r /tmp/whisper-src/include app/src/main/cpp/whisper/
          rm -rf /tmp/whisper-src
          echo "=== whisper files ==="
          find app/src/main/cpp/whisper -name "*.c" -o -name "*.cpp" -o -name "*.h" | wc -l

      - name: Build APK
        run: chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lao-translator-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
